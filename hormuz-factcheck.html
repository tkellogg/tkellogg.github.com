  const delay = globalIndex * 30;

        marginBottom: "2px",
        background: open ? v.bg : "transparent",

      }}

              marginRight: "8px",

          >

            style={{
              fontFamily: "'Source Serif 4', 'Georgia', serif",
              fontSize: "15px",
              color: "#e5e5e5",

        </div>
        <div

              color: "#a3a3a3",

function HormuzFactCheck() {
  const [filter, setFilter] = useState("all");

  const counts = { true: 0, "mostly-true": 0, joke: 0 };
  SECTIONS.forEach((s) => s.items.forEach((item) => counts[item.verdict]++));
  const total = counts.true + counts["mostly-true"] + counts.joke;

  let globalIndex = 0;

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "#0a0a0a",
        color: "#e5e5e5",
        fontFamily: "'Source Serif 4', Georgia, serif",
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap');

        @keyframes fadeSlideIn {
          from { opacity: 0; transform: translateY(6px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes tickerScroll {
          from { transform: translateX(0); }
          to { transform: translateX(-50%); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }

        #hormuz-root, #hormuz-root * { box-sizing: border-box; }
        #hormuz-root ::-webkit-scrollbar { width: 6px; }
        #hormuz-root ::-webkit-scrollbar-track { background: #0a0a0a; }
        #hormuz-root ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      `}</style>

      {/* Ticker bar */}
      <div
        style={{
          background: "#dc2626",
          overflow: "hidden",
          whiteSpace: "nowrap",
          padding: "5px 0",
          position: "sticky",
          top: "60px",
          zIndex: 999,
        }}
      >
        <div
          style={{
            display: "inline-block",
            animation: "tickerScroll 30s linear infinite",
            fontFamily: "'Courier Prime', monospace",
            fontSize: "11px",
            fontWeight: 700,
            letterSpacing: "1px",
            color: "#fff",
          }}
        >
          {Array(3)
            .fill(
              "  \u25c6 STRAIT OF HORMUZ CRISIS \u2014 DAY 43  \u25c6 HEGSETH: STRAIT IS OPEN  \u25c6 IRAN: STRAIT IS CLOSED  \u25c6 20,000 SEAFARERS STRANDED  \u25c6 TOLLS: $2M/SHIP IN CRYPTO  \u25c6 SHIPS TRANSITING: ~7/DAY (WAS 120)  \u25c6 OIL: $96/BBL  \u25c6 CEASEFIRE STATUS: UNCLEAR  "
            )
            .join("")}
        </div>
      </div>

      {/* Header */}
      <div style={{ maxWidth: "680px", margin: "0 auto", padding: "32px 20px 0" }}>
        <div style={{ marginBottom: "8px", display: "flex", alignItems: "center", gap: "8px" }}>
          <div
            style={{
              width: "8px",
              height: "8px",
              borderRadius: "50%",
              background: "#dc2626",
              animation: "pulse 2s ease infinite",
            }}
          />
          <span
            style={{
              fontFamily: "'Courier Prime', monospace",
              fontSize: "10px",
              letterSpacing: "2px",
              color: "#737373",
              textTransform: "uppercase",
            }}
          >
            Fact Check / Satire Analysis
          </span>
        </div>

        <h1
          style={{
            fontFamily: "'Source Serif 4', Georgia, serif",
            fontSize: "28px",
            fontWeight: 700,
            lineHeight: 1.2,
            color: "#fff",
            marginBottom: "8px",
          }}
        >
          The Strait of Hormuz Tweet:
          <br />
          <span style={{ color: "#737373", fontStyle: "italic", fontWeight: 300 }}>
            Satire or Just the News?
          </span>
        </h1>

        <p
          style={{
            fontFamily: "'Source Serif 4', Georgia, serif",
            fontSize: "14px",
            color: "#737373",
            lineHeight: 1.6,
            marginBottom: "24px",
          }}
        >
          A <a href="https://x.com/arrogance_0024/status/2042643613885124650" target="_blank" rel="noopener noreferrer" style={{color: "#8b8b8b", textDecoration: "underline", textUnderlineOffset: "2px"}}>viral tweet</a> listed dozens of "BREAKING" updates about the Strait of Hormuz crisis.
          We checked each one. Tap any item to see the verdict and sources.
        </p>

        {/* Stats bar */}
        <div
          style={{
            display: "flex",
            gap: "1px",
            marginBottom: "6px",
            borderRadius: "3px",
            overflow: "hidden",
            height: "6px",
          }}
        >
          <div style={{ flex: counts.true, background: "#dc2626" }} />
          <div style={{ flex: counts["mostly-true"], background: "#ea580c" }} />
          <div style={{ flex: counts.joke, background: "#6366f1" }} />
        </div>

        <div
          style={{
            display: "flex",
            gap: "16px",
            marginBottom: "20px",
            fontFamily: "'Courier Prime', monospace",
            fontSize: "11px",
          }}
        >
          {Object.entries(VERDICT_CONFIG).map(([key, v]) => (
            <button
              key={key}
              onClick={() => setFilter(filter === key ? "all" : key)}
              style={{
                background: "none",
                border: "none",
                cursor: "pointer",
                color: filter === "all" || filter === key ? v.color : "#555",
                fontFamily: "inherit",
                fontSize: "inherit",
                padding: 0,
                transition: "color 0.15s",
                opacity: filter === "all" || filter === key ? 1 : 0.5,
              }}
            >
              {v.icon} {counts[key]} {v.label}
            </button>
          ))}
          {filter !== "all" && (
            <button
              onClick={() => setFilter("all")}
              style={{
                background: "none",
                border: "1px solid #333",
                borderRadius: "2px",
                cursor: "pointer",
                color: "#737373",
                fontFamily: "inherit",
                fontSize: "10px",
                padding: "0 6px",
              }}
            >
              CLEAR
            </button>
          )}
        </div>
      </div>

      {/* Items */}
      <div style={{ maxWidth: "680px", margin: "0 auto", padding: "0 20px 60px" }}>
        {SECTIONS.map((section, si) => {
          const filteredItems = section.items.filter(
            (item) => filter === "all" || item.verdict === filter
          );
          if (filteredItems.length === 0) return null;

          return (
            <div key={si}>
              {si > 0 && (
                <div
                  style={{
                    borderTop: "1px solid #1a1a1a",
                    margin: "16px 0",
                    position: "relative",
                  }}
                >
                  <span
                    style={{
                      position: "absolute",
                      top: "-8px",
                      left: "50%",
                      transform: "translateX(-50%)",
                      background: "#0a0a0a",
                      padding: "0 12px",
                      fontFamily: "'Courier Prime', monospace",
                      fontSize: "9px",
                      color: "#333",
                      letterSpacing: "2px",
                    }}
                  >
                    {"\u25c6 \u25c6 \u25c6"}
                  </span>
                </div>
              )}
              {filteredItems.map((item) => {
                const idx = globalIndex++;
                return <BreakingItem key={`${si}-${item.text}`} item={item} globalIndex={idx} />;
              })}
            </div>
          );
        })}

        {/* Footer */}
        <div
          style={{
            marginTop: "40px",
            padding: "20px 0",
            borderTop: "1px solid #1a1a1a",
            fontFamily: "'Courier Prime', monospace",
            fontSize: "10px",
            color: "#404040",
            textAlign: "center",
            lineHeight: 1.8,
          }}
        >
          <div>FINAL TALLY: {counts.true + counts["mostly-true"]} OF {total} ITEMS GROUNDED IN REALITY</div>
          <div style={{ color: "#555", marginTop: "4px" }}>
            Sources: Wikipedia, Axios, CNBC, The Hill, Al Jazeera, Fortune,
            <br />
            ABC News, UN News, CoinDesk, Chainalysis, TRM Labs, USNI News
          </div>
          <div style={{ color: "#333", marginTop: "12px" }}>
            "The strait is a philosophical concept at this point."
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('hormuz-root')).render(<HormuzFactCheck />);
</script>
{% endraw %}
