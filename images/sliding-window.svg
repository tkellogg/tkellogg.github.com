<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" font-family="system-ui, -apple-system, sans-serif">
  <!-- Full conversation history - horizontal timeline -->
  <text x="20" y="24" font-size="13" fill="#777">conversation history</text>

  <!-- Message blocks along the timeline -->
  <!-- Msg 1 - faded, outside window -->
  <rect x="20" y="40" width="70" height="36" rx="5" fill="#3b82f6" opacity="0.2"/>
  <text x="30" y="63" font-size="10" fill="#3b82f6" opacity="0.4">you</text>

  <!-- Msg 2 - faded -->
  <rect x="100" y="40" width="70" height="36" rx="5" fill="#6b7280" opacity="0.2"/>
  <text x="110" y="63" font-size="10" fill="#6b7280" opacity="0.4">asst</text>

  <!-- Msg 3 - faded -->
  <rect x="180" y="40" width="70" height="36" rx="5" fill="#3b82f6" opacity="0.2"/>
  <text x="190" y="63" font-size="10" fill="#3b82f6" opacity="0.4">you</text>

  <!-- Msg 4 - in window -->
  <rect x="260" y="40" width="70" height="36" rx="5" fill="#6b7280" opacity="0.8"/>
  <text x="270" y="63" font-size="10" fill="#fff">asst</text>

  <!-- Msg 5 - in window -->
  <rect x="340" y="40" width="70" height="36" rx="5" fill="#3b82f6" opacity="0.85"/>
  <text x="350" y="63" font-size="10" fill="#fff">you</text>

  <!-- Msg 6 - in window -->
  <rect x="420" y="40" width="70" height="36" rx="5" fill="#6b7280" opacity="0.8"/>
  <text x="430" y="63" font-size="10" fill="#fff">asst</text>

  <!-- Msg 7 - in window -->
  <rect x="500" y="40" width="70" height="36" rx="5" fill="#3b82f6" opacity="0.85"/>
  <text x="510" y="63" font-size="10" fill="#fff">you</text>

  <!-- Sliding window bracket -->
  <rect x="250" y="30" width="330" height="56" rx="8" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="360" y="106" font-size="12" fill="#f59e0b" font-weight="600" text-anchor="middle">sliding window</text>

  <!-- Arrow showing slide direction -->
  <path d="M240 108 L530 108" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrowAmber)" stroke-dasharray="5 3"/>
  <defs>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Rebuilt context below -->
  <path d="M415 120 L415 145" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="20" y="165" font-size="13" fill="#777">rebuilt context</text>

  <rect x="20" y="175" width="555" height="190" rx="8" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- System prompt / memory summary at top -->
  <rect x="40" y="190" width="515" height="30" rx="5" fill="#a855f7" opacity="0.25"/>
  <text x="52" y="210" font-size="11" fill="#7c3aed">system prompt + memory summary of older messages</text>

  <!-- Windowed messages rebuilt into context -->
  <rect x="40" y="230" width="120" height="30" rx="5" fill="#6b7280" opacity="0.8"/>
  <text x="52" y="250" font-size="10" fill="#fff">asst</text>

  <rect x="170" y="230" width="120" height="30" rx="5" fill="#3b82f6" opacity="0.85"/>
  <text x="182" y="250" font-size="10" fill="#fff">you</text>

  <rect x="300" y="230" width="120" height="30" rx="5" fill="#6b7280" opacity="0.8"/>
  <text x="312" y="250" font-size="10" fill="#fff">asst</text>

  <rect x="430" y="230" width="120" height="30" rx="5" fill="#3b82f6" opacity="0.85"/>
  <text x="442" y="250" font-size="10" fill="#fff">you</text>

  <!-- Memory blocks -->
  <text x="40" y="280" font-size="11" fill="#7c3aed" font-weight="600">memory blocks:</text>
  <rect x="150" y="266" width="80" height="24" rx="4" fill="#a855f7" opacity="0.25"/>
  <text x="160" y="282" font-size="10" fill="#7c3aed">persona</text>
  <rect x="240" y="266" width="88" height="24" rx="4" fill="#a855f7" opacity="0.25"/>
  <text x="250" y="282" font-size="10" fill="#7c3aed">guidelines</text>
  <rect x="338" y="266" width="72" height="24" rx="4" fill="#a855f7" opacity="0.25"/>
  <text x="348" y="282" font-size="10" fill="#7c3aed">project</text>
  <rect x="420" y="266" width="88" height="24" rx="4" fill="#a855f7" opacity="0.25"/>
  <text x="430" y="282" font-size="10" fill="#7c3aed">references</text>

  <text x="275" y="350" font-size="11" fill="#555" text-anchor="middle">context is rebuilt from scratch each turn</text>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
  </defs>
</svg>
